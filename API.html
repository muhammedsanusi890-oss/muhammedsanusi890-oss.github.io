<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Search App</title>

  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #0f172a;
      color: white;
    }

    .hero {
      padding: 60px 20px;
      text-align: center;
    }

    .hero h1 {
      font-weight: bold;
      margin-bottom: 10px;
    }

    .search-box {
      max-width: 600px;
      margin: 0 auto;
    }

    .card {
      border: none;
      border-radius: 15px;
      overflow: hidden;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      height: 180px;
      object-fit: cover;
    }

    .results {
      margin-top: 30px;
    }

    audio {
      width: 100%;
    }
  </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>🎵 Music Finder</h1>
  <p>Search millions of songs instantly</p>

  <div class="input-group search-box mt-3">
    <input type="text" id="searchInput" class="form-control" placeholder="Search songs, artists...">
    <button class="btn btn-primary" onclick="search()">Search</button>
  </div>
</div>


<div class="container results">
  <div class="row" id="results"></div>
</div>

<script>
async function search() {
  const query = document.getElementById("searchInput").value;

  const url = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&entity=song&limit=20`;

  const res = await fetch(url);
  const data = await res.json();

  displayResults(data.results);
}

function displayResults(items) {
  const container = document.getElementById("results");
  container.innerHTML = "";

  if (!items.length) {
    container.innerHTML = "<p class='text-center'>No results found</p>";
    return;
  }

  items.forEach(item => {
    const col = document.createElement("div");
    col.className = "col-md-3 mb-4";

    col.innerHTML = `
      <div class="card bg-dark text-white shadow">
        <img src="${item.artworkUrl100}" class="card-img-top">
        <div class="card-body">
          <h6>${item.trackName}</h6>
          <p class="text-muted mb-1">${item.artistName}</p>
          <small>${item.collectionName || ""}</small>
        </div>
        <div class="card-footer bg-dark border-0">
          ${item.previewUrl ? `<audio controls src="${item.previewUrl}"></audio>` : ""}
        </div>
      </div>
    `;

    container.appendChild(col);
  });
}
</script>

</body>
</html>
