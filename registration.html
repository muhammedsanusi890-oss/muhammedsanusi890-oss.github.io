<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="registration.css" rel="stylesheet">
    <title>Document</title>
</head>
<body>


  <a href="responsive.html">Lab 3</a>


    <section class="wrapper-container">
  <div class="content">
  <div id="register" class="wrapper">
    
    <div class="heading-wrapper">
      <h3>Register over here 😁 👍</h3>
    </div>

    <form id="regForm">

      <div class="mb-3">
        <label for="firstName" class="form-label">First Name</label>
        <input type="text" class="form-control" id="firstName" required>
      </div>

      <div class="mb-3">
        <label for="lastName" class="form-label">Last Name</label>
        <input type="text" class="form-control" id="lastName" required>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" required>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" required>
      </div>

      <div class="mb-3">
        <label for="dob" class="form-label">Date of Birth</label>
        <input type="date" class="form-control" id="dob" required>
      </div>

      <button type="button" class="btn btn-primary" id="subtn" onclick="approve()">Submit</button>

    </form>

  </div>
  <div id="result" class="result"></div>
  </div>
</section>
</body>
</html>


<script>
let user = {
    firstName: "",
    lastName: "",
    email: "",
    password: "",
    dob: ""
};

const firstname = document.getElementById('firstName');
const lastname  = document.getElementById('lastName');
const email     = document.getElementById('email');
const password  = document.getElementById('password');
const dob       = document.getElementById('dob');
const result  = document.getElementById('result')


function approve() {
    user.firstName = firstname.value.trim()
    user.lastName = lastname.value.trim()
    user.email = email.value.trim()
    user.password = password.value
    user.dob = dob.value

    if(!user.firstName || !user.lastName || !user.dob || !user.email){
            result.style.display = "block"
         result.innerHTML = `<p style="color:red;">Registration Failed 😒: All fields are required</p>`;
        return;
     }

     if (!(user.password.includes("!") || user.password.includes("?"))) {
            result.style.display = "block"
        result.innerHTML = `<p style="color:red;">Registration Failed 😒: Password must contain ! or ?</p>`;
        return;
    }
   

    let asterisk_password = '*'.repeat(user.password.length)

    result.style.display = "block"

    result.innerHTML = `<h4 style="color:green;">Registration Successful 😎!</h4>
        <p><strong>First Name:</strong> ${user.firstName}</p>
        <p><strong>Last Name:</strong> ${user.lastName}</p>
        <p><strong>Email:</strong> ${user.email}</p>
        <p><strong>Password:</strong> ${asterisk_password}</p>
        <p><strong>Date of Birth:</strong> ${user.dob}</p>
    `;



}
</script>
